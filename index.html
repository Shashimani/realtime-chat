<!DOCTYPE html>
<html>
<head>
    <title>Realtime Chat</title>

    <style>
        body {
            margin: 0;
            font-family: Arial;
            display: flex;
            height: 100vh;
            background: #0f172a;
            color: white;
        }

        /* Sidebar */
        #users {
            width: 220px;
            background: #020617;
            padding: 15px;
            border-right: 1px solid #1e293b;
        }

        #users h3 {
            margin-top: 0;
        }

        #userList li {
            list-style: none;
            padding: 6px;
            margin: 5px 0;
            background: #1e293b;
            border-radius: 6px;
        }

        /* Chat Section */
        #chat-section {
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        /* Header */
        #top {
            padding: 10px;
            background: #020617;
            border-bottom: 1px solid #1e293b;
        }

        /* Messages */
        #chat {
            flex: 1;
            overflow-y: auto;
            padding: 15px;
            list-style: none;
        }

        .msg {
            padding: 8px 12px;
            margin: 6px 0;
            max-width: 60%;
            border-radius: 10px;
        }

        .me {
            background: #2563eb;
            margin-left: auto;
        }

        .other {
            background: #1e293b;
            margin-right: auto;
        }

        .system {
            text-align: center;
            color: #94a3b8;
            font-size: 12px;
        }

        /* Input area */
        #bottom {
            display: flex;
            padding: 10px;
            background: #020617;
            border-top: 1px solid #1e293b;
        }

        input {
            padding: 8px;
            margin-right: 5px;
            border-radius: 6px;
            border: none;
        }

        button {
            padding: 8px 12px;
            background: #2563eb;
            border: none;
            color: white;
            border-radius: 6px;
            cursor: pointer;
        }
    </style>
</head>

<body>

<!-- Sidebar -->
<div id="users">
    <h3>🟢 Users</h3>
    <ul id="userList"></ul>
</div>

<!-- Chat -->
<div id="chat-section">

    <div id="top">
        <input id="username" placeholder="Enter username"/>
        <button onclick="connect()">Connect</button>
    </div>

    <ul id="chat"></ul>

    <div id="bottom">
        <input id="to" placeholder="To (optional)"/>
        <input id="msg" placeholder="Message"/>
        <button onclick="send()">Send</button>
    </div>

</div>

<script>
let ws;
let currentUser = "";

function connect() {
    currentUser = document.getElementById("username").value;

    ws = new WebSocket(`wss://${location.host}/ws`);

    ws.onopen = () => {
        ws.send(currentUser);
    };

    ws.onmessage = (event) => {
        let data = event.data;

        // USERS LIST
        if (data.startsWith("USERS:")) {
            let users = data.replace("USERS:", "").split(",");
            let ul = document.getElementById("userList");
            ul.innerHTML = "";

            users.forEach(user => {
                let li = document.createElement("li");
                li.innerText = user;
                ul.appendChild(li);
            });
            return;
        }

        let li = document.createElement("li");

        // SYSTEM MESSAGE
        if (data.includes("joined") || data.includes("left")) {
            li.className = "system";
            li.innerText = data;
        }
        else {
            li.classList.add("msg");

            if (data.startsWith(currentUser)) {
                li.classList.add("me");
            } else {
                li.classList.add("other");
            }

            li.innerText = data;
        }

        document.getElementById("chat").appendChild(li);
        li.scrollIntoView();
    };
}

function send() {
    let to = document.getElementById("to").value;
    let msg = document.getElementById("msg").value;

    if (to === "") {
        ws.send(msg);
    } else {
        ws.send(to + "|" + msg);
    }

    document.getElementById("msg").value = "";
}
</script>

</body>
</html>
